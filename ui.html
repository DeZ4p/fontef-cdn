   FontEF Pro v1.0
   Author: @DeZ4p | t.me/DeZ4p

<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FontEF Pro</title>
    <link rel="stylesheet" href="https://dez4p.github.io/fontef-cdn/style.css">
</head>
<body>

<div class="bg-fx">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
</div>

<div class="app">

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="logo-box">
                <svg class="logo-svg" viewBox="0 0 48 48" width="44" height="44">
                    <defs>
                        <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#6366f1"/>
                            <stop offset="50%" style="stop-color:#a78bfa"/>
                            <stop offset="100%" style="stop-color:#06b6d4"/>
                        </linearGradient>
                    </defs>
                    <circle cx="24" cy="24" r="22" fill="none" stroke="url(#lg1)" stroke-width="2" opacity="0.3"/>
                    <circle cx="24" cy="24" r="18" fill="none" stroke="url(#lg1)" stroke-width="1.5" stroke-dasharray="4 3" class="logo-spin"/>
                    <text x="24" y="31" text-anchor="middle" fill="url(#lg1)" font-size="24" font-weight="900" font-family="system-ui" font-style="italic">F</text>
                </svg>
            </div>
            <div>
                <h1>FontEF <span class="pro">Pro</span></h1>
                <div class="header-sub"></div>
            </div>
            <button class="theme-toggle" id="themeToggleBtn">
                <svg class="theme-icon-dark" viewBox="0 0 24 24" width="20" height="20"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
                <svg class="theme-icon-light" viewBox="0 0 24 24" width="20" height="20" style="display:none"><circle cx="12" cy="12" r="5" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="1.5"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="1.5"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="1.5"/><line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="1.5"/><line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="1.5"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="1.5"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
        </div>
    </div>

      <!-- Language Bar (built by JS from config) -->
    <div class="lang-bar" id="langBar"></div>

    <!-- Root Status -->
    <div class="root-card" id="rootCard">
        <div class="root-indicator">
            <div class="root-icon-box">
                <svg class="root-icon-svg" viewBox="0 0 24 24" width="28" height="28">
                    <circle cx="12" cy="12" r="10" fill="none" stroke="#64748b" stroke-width="2" class="root-circle"/>
                    <path d="M8 12l3 3 5-5" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="root-check" style="opacity:0"/>
                </svg>
            </div>
            <div class="root-info">
                <div class="root-title" id="rootTitle">Loading...</div>
                <div class="root-detail" id="rootDetail"></div>
            </div>
            <div class="root-status-dot" id="rootDot"></div>
        </div>
        <div class="root-meta">
            <div class="root-meta-item">
                <svg viewBox="0 0 24 24" width="14" height="14"><rect x="5" y="2" width="14" height="20" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="18" x2="12" y2="18.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                <span id="metaDeviceText">—</span>
            </div>
            <div class="root-meta-item">
                <svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span id="metaRomText">—</span>
            </div>
            <div class="root-meta-item">
                <svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
                <span id="metaKsuText">—</span>
            </div>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-card">
            <svg class="stat-svg" viewBox="0 0 24 24" width="22" height="22"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2zM12 15a3 3 0 110-6 3 3 0 010 6z" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            <span class="stat-val" id="statFonts">0</span>
            <span class="stat-lbl" id="lbl_installed">Installed</span>
        </div>
        <div class="stat-card">
            <svg class="stat-svg" viewBox="0 0 24 24" width="22" height="22"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" fill="none" stroke="currentColor" stroke-width="1.5"/><polyline points="17,21 17,13 7,13 7,21" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            <span class="stat-val" id="statBackups">0</span>
            <span class="stat-lbl" id="lbl_backups">Backups</span>
        </div>
        <div class="stat-card">
            <svg class="stat-svg" viewBox="0 0 24 24" width="22" height="22"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            <span class="stat-val" id="statOverlay">—</span>
            <span class="stat-lbl" id="lbl_overlay">Overlay</span>
        </div>
        <div class="stat-card">
            <svg class="stat-svg" viewBox="0 0 24 24" width="22" height="22"><rect x="5" y="2" width="14" height="20" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="18" x2="12" y2="18.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <span class="stat-val" id="statAndroid">—</span>
            <span class="stat-lbl" id="lbl_android">Android</span>
        </div>
    </div>

    <!-- ROM Preset (built by JS from config) -->
    <div class="card glass">
        <div class="card-head">
            <svg class="card-svg" viewBox="0 0 24 24" width="20" height="20"><rect x="5" y="2" width="14" height="20" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="18" x2="12" y2="18.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <span id="lbl_preset">ROM Preset</span>
            <span class="card-badge" id="presetName">Universal</span>
        </div>
        <div class="preset-scroll"><div class="preset-grid" id="presetGrid"></div></div>
    </div>

    <!-- Upload -->
    <div class="card glass">
        <div class="card-head">
            <svg class="card-svg" viewBox="0 0 24 24" width="20" height="20"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" fill="none" stroke="currentColor" stroke-width="1.5"/><polyline points="17,8 12,3 7,8" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="3" x2="12" y2="15" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            <span id="lbl_upload">Upload Font</span>
        </div>
        <div class="upload-zone" id="dropZone">
            <div class="upload-visual">
                <svg class="upload-svg" viewBox="0 0 64 64" width="56" height="56">
                    <circle cx="32" cy="32" r="28" fill="none" stroke="url(#lg1)" stroke-width="1.5" stroke-dasharray="6 4" class="upload-ring"/>
                    <path d="M32 42V22M24 30l8-8 8 8" fill="none" stroke="url(#lg1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="upload-arrow-path"/>
                </svg>
            </div>
            <p class="upload-title" id="lbl_drag">Drag & Drop your font file</p>
            <p class="upload-hint" id="lbl_or_click">or tap to browse files</p>
            <div class="upload-formats"><span class="format-tag">.TTF</span><span class="format-tag">.OTF</span></div>
        </div>
        <input type="file" id="fontInput" accept=".ttf,.otf" style="display:none">
        <div class="file-info" id="fileInfo">
            <div class="file-ico-box"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" fill="none" stroke="#10b981" stroke-width="1.5"/><polyline points="14,2 14,8 20,8" fill="none" stroke="#10b981" stroke-width="1.5"/></svg></div>
            <div class="file-details"><span class="file-name" id="fileName"></span><span class="file-size" id="fileSize"></span></div>
            <button class="remove-btn" id="removeBtn"><svg viewBox="0 0 24 24" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
        </div>
    </div>

    <!-- Preview (built by JS from config) -->
    <div class="card glass" id="previewCard">
        <div class="card-head">
            <svg class="card-svg" viewBox="0 0 24 24" width="20" height="20"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            <span id="lbl_preview">Font Preview</span>
        </div>
        <div class="preview-section" id="previewSection"></div>
    </div>

    <!-- Actions -->
    <div class="actions">
        <button class="btn-apply" id="applyBtn" disabled><span class="btn-shine"></span><span class="btn-content"><svg viewBox="0 0 24 24" width="20" height="20"><path d="M22 11.08V12a10 10 0 11-5.93-9.14" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="22,4 12,14.01 9,11.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span id="lbl_apply">Apply Font</span></span></button>
        <div class="btn-row">
            <button class="btn-action" id="resetBtn"><svg viewBox="0 0 24 24" width="18" height="18"><polyline points="1,4 1,10 7,10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10" fill="none" stroke="currentColor" stroke-width="1.5"/></svg><span id="lbl_reset">Reset</span></button>
            <button class="btn-action" id="backupBtn"><svg viewBox="0 0 24 24" width="18" height="18"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" fill="none" stroke="currentColor" stroke-width="1.5"/><polyline points="17,21 17,13 7,13 7,21" fill="none" stroke="currentColor" stroke-width="1.5"/></svg><span id="lbl_backup">Backup</span></button>
            <button class="btn-action" id="refreshBtn"><svg viewBox="0 0 24 24" width="18" height="18"><polyline points="23,4 23,10 17,10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><polyline points="1,20 1,14 7,14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" fill="none" stroke="currentColor" stroke-width="1.5"/></svg><span id="lbl_refresh">Refresh</span></button>
            <button class="btn-action" id="rebootBtn"><svg viewBox="0 0 24 24" width="18" height="18"><path d="M18.36 6.64a9 9 0 11-12.73 0" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="2" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span id="lbl_reboot">Reboot</span></button>
        </div>
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progressWrap">
        <div class="progress-header"><span class="progress-title" id="progressTitle"></span><span class="progress-pct" id="progressPct">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-steps" id="progressSteps"></div>
    </div>

    <!-- Logs -->
    <div class="card glass" id="logCard">
        <div class="card-head">
            <svg class="card-svg" viewBox="0 0 24 24" width="20" height="20"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" fill="none" stroke="currentColor" stroke-width="1.5"/><polyline points="14,2 14,8 20,8" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="16" y1="13" x2="8" y2="13" stroke="currentColor" stroke-width="1.5"/><line x1="16" y1="17" x2="8" y2="17" stroke="currentColor" stroke-width="1.5"/></svg>
            <span id="lbl_logs">Logs</span>
            <div class="log-actions">
                <button class="log-btn" id="logClear"><svg viewBox="0 0 24 24" width="14" height="14"><polyline points="3,6 5,6 21,6" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg></button>
                <button class="log-btn" id="logToggle">▼</button>
            </div>
        </div>
        <div class="log-content" id="logContent"></div>
    </div>

    <!-- Footer (built by JS from config) -->
    <div class="footer"></div>

</div>

<script src="https://dez4p.github.io/fontef-cdn/app.js"></script>
</body>
</html>
